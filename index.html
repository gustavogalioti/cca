<script>
// window.storage só existe dentro do ambiente de artifacts do Claude.
// Fora dele (ex: este site no GitHub Pages), usamos localStorage do navegador
// pra persistir os dados de verdade entre visitas.
if(!window.storage){
  window.storage = {
    async set(key, value){
      try{ localStorage.setItem(key, value); return {key, value}; }
      catch(e){ return null; }
    },
    async get(key){
      const v = localStorage.getItem(key);
      if(v === null) throw new Error('key not found: ' + key);
      return {key, value: v};
    },
    async delete(key){
      localStorage.removeItem(key);
      return {key, deleted: true};
    },
    async list(prefix){
      const p = prefix || '';
      const keys = Object.keys(localStorage).filter(k => k.startsWith(p));
      return {keys, prefix};
    }
  };
}

let currentPhotoData = null; // resized base64
let editingId = null;

const $ = (id) => document.getElementById(id);

function initials(name){
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('') || '?';
}

function maskCpf(v){
  v = v.replace(/\D/g,'').slice(0,11);
  if(v.length>9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
  if(v.length>6) return v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  if(v.length>3) return v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  return v;
}
$('fCpf').addEventListener('input', (e)=>{ e.target.value = maskCpf(e.target.value); });

function maskTelefone(v){
  v = v.replace(/\D/g,'').slice(0,11);
  if(v.length>10) return v.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  if(v.length>6) return v.replace(/(\d{2})(\d{4})(\d{1,4})/,'($1) $2-$3');
  if(v.length>2) return v.replace(/(\d{2})(\d{1,5})/,'($1) $2');
  return v;
}
$('fTelefone').addEventListener('input', (e)=>{ e.target.value = maskTelefone(e.target.value); });

function formatDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// resize + compress uploaded photo
function handlePhotoFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const size = 200;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const side = Math.min(img.width, img.height);
        const sx = (img.width-side)/2, sy = (img.height-side)/2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

$('fFoto').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    currentPhotoData = await handlePhotoFile(file);
    $('photoPreview').style.backgroundImage = `url(${currentPhotoData})`;
    $('photoPreview').textContent = '';
  }catch(err){
    setStatus('Não foi possível carregar a foto.', true);
  }
});

function setStatus(msg, isErr){
  const el = $('formStatus');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

function renderCard(data){
  $('cardNome').textContent = data.nome || 'Nome do Sócio';
  $('cardDesde').textContent = formatDate(data.desde);
  $('cardCpf').textContent = data.cpf || '—';
  const contatoParts = [data.telefone, data.email].filter(Boolean);
  $('cardContato').textContent = contatoParts.length ? contatoParts.join(' · ') : '—';
  const photoEl = $('cardPhoto');
  if(data.foto){
    photoEl.style.backgroundImage = `url(${data.foto})`;
    photoEl.textContent = '';
  } else {
    photoEl.style.backgroundImage = 'none';
    photoEl.textContent = initials(data.nome || '?');
  }
  // QR: encode the identification text directly so any camera can read it, no hosting needed
  const qrLines = [
    'CLUBE DE CAMPO ADRIANA - CCA',
    `Sócio: ${data.nome || ''}`,
    `CPF: ${data.cpf || ''}`,
    `Membro desde: ${formatDate(data.desde)}`
  ];
  if(data.telefone) qrLines.push(`Telefone: ${data.telefone}`);
  if(data.email) qrLines.push(`Email: ${data.email}`);
  const qrText = qrLines.join('\n');
  const qrDiv = $('qrHost');
  qrDiv.innerHTML = '';
  try{
    if(typeof QRCode === 'undefined') throw new Error('QRCode lib não carregada');
    new QRCode(qrDiv, {
      text: qrText,
      width: 62, height: 62,
      colorDark: '#16301F',
      colorLight: '#FBF7EC',
      correctLevel: QRCode.CorrectLevel.M
    });
  }catch(qrErr){
    qrDiv.innerHTML = '<div style="font-size:.5rem;color:#5B5748;width:62px;text-align:center;">QR indisponível</div>';
  }
}

function clearForm(){
  $('fNome').value=''; $('fCpf').value=''; $('fDesde').value='';
  $('fTelefone').value=''; $('fEmail').value='';
  currentPhotoData = null; editingId = null;
  $('photoPreview').style.backgroundImage='none';
  $('photoPreview').textContent='?';
  $('fFoto').value='';
  $('formTitle').textContent = 'Cadastrar sócio';
  $('btnGerar').textContent = 'Gerar carteirinha';
  setStatus('');
}

async function saveSocio(){
  const nome = $('fNome').value.trim();
  const cpf = $('fCpf').value.trim();
  const desde = $('fDesde').value;
  const telefone = $('fTelefone').value.trim();
  const email = $('fEmail').value.trim();
  if(!nome){ setStatus('Informe o nome do sócio.', true); return; }
  const id = editingId || ('s' + Date.now());
  const data = { nome, cpf, desde, telefone, email, foto: currentPhotoData };
  try{
    const res = await window.storage.set('socio:'+id, JSON.stringify(data), true);
    if(!res){ setStatus('Não foi possível salvar — tente novamente.', true); return; }
    editingId = id;
    $('formTitle').textContent = 'Editar sócio';
    $('btnGerar').textContent = 'Salvar alterações';
    renderCard(data);
    setStatus('Carteirinha gerada e salva ✓');
    loadGallery();
  }catch(err){
    renderCard(data);
    setStatus('Erro ao salvar: ' + (err && err.message ? err.message : 'desconhecido'), true);
  }
}

$('btnGerar').addEventListener('click', saveSocio);
$('btnLimpar').addEventListener('click', clearForm);
$('btnImprimir').addEventListener('click', ()=>window.print());

async function loadGallery(){
  const galleryEl = $('gallery');
  try{
    const listRes = await window.storage.list('socio:', true);
    const keys = (listRes && listRes.keys) || [];
    if(keys.length === 0){
      galleryEl.innerHTML = '<div class="empty-note">Nenhum sócio cadastrado ainda.</div>';
      $('galleryCount').textContent = '';
      return;
    }
    const items = [];
    for(const key of keys){
      try{
        const r = await window.storage.get(key, true);
        if(r && r.value) items.push({key, data: JSON.parse(r.value)});
      }catch(e){ /* skip unreadable key */ }
    }
    items.sort((a,b)=> (a.data.nome||'').localeCompare(b.data.nome||''));
    $('galleryCount').textContent = items.length + (items.length===1?' sócio':' sócios');
    galleryEl.innerHTML = '';
    items.forEach(({key,data})=>{
      const card = document.createElement('div');
      card.className = 'mini-card';
      card.innerHTML = `
        <div class="mini-actions">
          <button class="mini-edit" title="Editar">✎</button>
          <button class="mini-del" title="Excluir">✕</button>
        </div>
        <div class="mini-photo" style="${data.foto ? `background-image:url(${data.foto})` : ''}">${data.foto ? '' : initials(data.nome||'?')}</div>
        <div class="mini-name">${escapeHtml(data.nome||'—')}</div>
        <div class="mini-since">Sócio desde ${formatDate(data.desde)}</div>
      `;
      function loadIntoForm(){
        editingId = key.replace('socio:','');
        $('fNome').value = data.nome||'';
        $('fCpf').value = data.cpf||'';
        $('fDesde').value = data.desde||'';
        $('fTelefone').value = data.telefone||'';
        $('fEmail').value = data.email||'';
        currentPhotoData = data.foto||null;
        $('photoPreview').style.backgroundImage = data.foto ? `url(${data.foto})` : 'none';
        $('photoPreview').textContent = data.foto ? '' : '?';
        renderCard(data);
        $('formTitle').textContent = 'Editar sócio';
        $('btnGerar').textContent = 'Salvar alterações';
        setStatus('Sócio carregado para edição.');
        window.scrollTo({top:0, behavior:'smooth'});
      }
      card.addEventListener('click', (e)=>{
        if(e.target.classList.contains('mini-del') || e.target.classList.contains('mini-edit')) return;
        loadIntoForm();
      });
      card.querySelector('.mini-edit').addEventListener('click', (e)=>{
        e.stopPropagation();
        loadIntoForm();
      });
      card.querySelector('.mini-del').addEventListener('click', async (e)=>{
        e.stopPropagation();
        try{
          await window.storage.delete(key, true);
          if(editingId === key.replace('socio:','')) clearForm();
          loadGallery();
        }catch(err){ setStatus('Não foi possível excluir.', true); }
      });
      galleryEl.appendChild(card);
    });
  }catch(err){
    galleryEl.innerHTML = '<div class="empty-note">Não foi possível carregar a galeria agora.</div>';
  }
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- TABS ---------- */
$('tabBtnSocios').addEventListener('click', ()=>{
  $('tabBtnSocios').classList.add('active');
  $('tabBtnEventos').classList.remove('active');
  $('tabSocios').style.display = '';
  $('tabEventos').style.display = 'none';
});
$('tabBtnEventos').addEventListener('click', ()=>{
  $('tabBtnEventos').classList.add('active');
  $('tabBtnSocios').classList.remove('active');
  $('tabEventos').style.display = '';
  $('tabSocios').style.display = 'none';
  refreshEventos();
});

/* ---------- EVENTOS ---------- */
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let calDate = new Date(); calDate.setDate(1);
let selectedDateStr = null;
let editingEventId = null;

function pad2(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function formatDateTimeShort(dataIso, hora){
  if(!dataIso) return '—';
  const [y,m,d] = dataIso.split('-');
  return `${d}/${m}/${y}` + (hora ? ` às ${hora}` : '');
}

async function getAllEvents(){
  const listRes = await window.storage.list('evento:', true);
  const keys = (listRes && listRes.keys) || [];
  const items = [];
  for(const key of keys){
    try{
      const r = await window.storage.get(key, true);
      if(r && r.value) items.push({key, data: JSON.parse(r.value)});
    }catch(e){ /* skip */ }
  }
  return items;
}

function renderCalendar(events){
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  $('calLabel').textContent = `${MESES_PT[month]} ${year}`;

  const eventDays = new Set(events.map(({data})=> data.data));
  const firstWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayKey = dateKey(new Date());

  const grid = $('calGrid');
  grid.innerHTML = '';
  for(let i=0;i<firstWeekday;i++){
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }
  for(let day=1; day<=daysInMonth; day++){
    const thisKey = `${year}-${pad2(month+1)}-${pad2(day)}`;
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (thisKey===todayKey?' today':'') + (thisKey===selectedDateStr?' selected':'');
    cell.innerHTML = String(day) + (eventDays.has(thisKey) ? '<div class="dot"></div>' : '');
    cell.addEventListener('click', ()=>{
      selectedDateStr = thisKey;
      $('eData').value = thisKey;
      renderCalendar(events);
    });
    grid.appendChild(cell);
  }
}

function renderEventList(events){
  const listEl = $('eventList');
  $('eventCount').textContent = events.length ? (events.length + (events.length===1?' evento':' eventos')) : '';
  if(events.length === 0){
    listEl.innerHTML = '<div class="empty-note">Nenhum evento cadastrado ainda.</div>';
    return;
  }
  const sorted = [...events].sort((a,b)=>{
    const da = (a.data.data||'') + 'T' + (a.data.hora||'00:00');
    const db = (b.data.data||'') + 'T' + (b.data.hora||'00:00');
    return da.localeCompare(db);
  });
  listEl.innerHTML = '';
  sorted.forEach(({key, data})=>{
    const card = document.createElement('div');
    card.className = 'mini-card';
    card.innerHTML = `
      <div class="mini-actions">
        <button class="mini-edit" title="Editar">✎</button>
        <button class="mini-del" title="Excluir">✕</button>
      </div>
      <div class="mini-when">${formatDateTimeShort(data.data, data.hora)}</div>
      <div class="mini-name">${escapeHtml(data.titulo||'—')}</div>
      ${data.convidados ? `<div class="mini-guests">Convidados: ${escapeHtml(data.convidados)}</div>` : ''}
    `;
    function loadIntoForm(){
      editingEventId = key.replace('evento:','');
      $('eTitulo').value = data.titulo||'';
      $('eData').value = data.data||'';
      $('eHora').value = data.hora||'';
      $('eConvidados').value = data.convidados||'';
      $('eventFormTitle').textContent = 'Editar evento';
      $('btnEventoSalvar').textContent = 'Salvar alterações';
      setEventStatus('Evento carregado para edição.');
    }
    card.addEventListener('click', (e)=>{
      if(e.target.classList.contains('mini-del') || e.target.classList.contains('mini-edit')) return;
      loadIntoForm();
    });
    card.querySelector('.mini-edit').addEventListener('click', (e)=>{ e.stopPropagation(); loadIntoForm(); });
    card.querySelector('.mini-del').addEventListener('click', async (e)=>{
      e.stopPropagation();
      try{
        await window.storage.delete(key, true);
        if(editingEventId === key.replace('evento:','')) clearEventForm();
        refreshEventos();
      }catch(err){ setEventStatus('Não foi possível excluir.', true); }
    });
    listEl.appendChild(card);
  });
}

async function refreshEventos(){
  try{
    const events = await getAllEvents();
    renderCalendar(events);
    renderEventList(events);
  }catch(err){
    $('eventList').innerHTML = '<div class="empty-note">Não foi possível carregar os eventos agora.</div>';
  }
}

function setEventStatus(msg, isErr){
  const el = $('eventStatus');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

function clearEventForm(){
  $('eTitulo').value=''; $('eData').value=''; $('eHora').value=''; $('eConvidados').value='';
  editingEventId = null;
  $('eventFormTitle').textContent = 'Novo evento';
  $('btnEventoSalvar').textContent = 'Adicionar evento';
  setEventStatus('');
}

async function saveEvento(){
  const titulo = $('eTitulo').value.trim();
  const data = $('eData').value;
  const hora = $('eHora').value;
  const convidados = $('eConvidados').value.trim();
  if(!titulo){ setEventStatus('Informe o título do evento.', true); return; }
  if(!data){ setEventStatus('Informe a data do evento.', true); return; }
  const id = editingEventId || ('e' + Date.now());
  const payload = { titulo, data, hora, convidados };
  try{
    const res = await window.storage.set('evento:'+id, JSON.stringify(payload), true);
    if(!res){ setEventStatus('Não foi possível salvar — tente novamente.', true); return; }
    editingEventId = id;
    $('eventFormTitle').textContent = 'Editar evento';
    $('btnEventoSalvar').textContent = 'Salvar alterações';
    setEventStatus('Evento salvo ✓');
    refreshEventos();
  }catch(err){
    setEventStatus('Erro ao salvar: ' + (err && err.message ? err.message : 'desconhecido'), true);
  }
}

$('btnEventoSalvar').addEventListener('click', saveEvento);
$('btnEventoLimpar').addEventListener('click', clearEventForm);
$('calPrev').addEventListener('click', ()=>{ calDate.setMonth(calDate.getMonth()-1); refreshEventos(); });
$('calNext').addEventListener('click', ()=>{ calDate.setMonth(calDate.getMonth()+1); refreshEventos(); });

// initial render
loadGallery();
renderCard({nome:'', cpf:'', desde:'', foto:null});
</script>
