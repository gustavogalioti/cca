<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCA — Carteirinha de Sócio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --green-deep:#16301F;
    --green:#234A30;
    --green-soft:#2F5D3B;
    --gold:#C6A15B;
    --gold-bright:#E4C87A;
    --cream:#F3ECD8;
    --paper:#FBF7EC;
    --ink:#1B1B16;
    --ink-soft:#5B5748;
    --danger:#8B3A3A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 20% 15%, #1c3a26 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #1a3522 0%, transparent 50%),
      var(--green-deep);
    color:var(--cream);
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .wrap{max-width:1040px;margin:0 auto;}
  header.app-head{
    text-align:center;
    margin-bottom:36px;
  }
  .crest-mini{width:56px;height:56px;margin:0 auto 10px;display:block;}
  header.app-head h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:2.1rem;
    letter-spacing:.04em;
    margin:0 0 4px;
    color:var(--gold-bright);
  }
  header.app-head p{
    margin:0;
    font-size:.82rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--cream);
    opacity:.6;
  }
  .grid{
    display:grid;
    grid-template-columns:minmax(280px,380px) 1fr;
    gap:32px;
    align-items:start;
  }
  @media (max-width:820px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(198,161,91,.25);
    border-radius:14px;
    padding:22px 22px 26px;
  }
  .panel h2{
    font-family:'Cormorant Garamond',serif;
    font-size:1.3rem;
    margin:0 0 16px;
    color:var(--gold-bright);
    font-weight:600;
  }
  label{
    display:block;
    font-size:.72rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--cream);
    opacity:.7;
    margin:14px 0 6px;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date]{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid rgba(198,161,91,.35);
    background:rgba(0,0,0,.18);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    font-size:.95rem;
  }
  input[type=text]:focus, input[type=date]:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  input[type=date]{color-scheme:dark;}

  .photo-row{display:flex;align-items:center;gap:14px;margin-top:6px;}
  .photo-preview{
    width:64px;height:64px;border-radius:50%;
    background:rgba(0,0,0,.25);
    border:1.5px solid var(--gold);
    background-size:cover;background-position:center;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold-bright);
  }
  .file-btn{
    display:inline-block;
    padding:9px 14px;
    border-radius:8px;
    border:1px solid var(--gold);
    color:var(--gold-bright);
    font-size:.8rem;
    cursor:pointer;
    background:transparent;
  }
  .file-btn:hover{background:rgba(198,161,91,.12);}
  input[type=file]{display:none;}

  .actions{display:flex;gap:10px;margin-top:20px;}
  button.primary{
    flex:1;
    padding:12px 14px;
    border-radius:8px;
    border:none;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    color:#26210f;
    font-weight:700;
    letter-spacing:.03em;
    font-size:.85rem;
    cursor:pointer;
  }
  button.primary:hover{filter:brightness(1.05);}
  button.ghost{
    padding:12px 14px;
    border-radius:8px;
    border:1px solid rgba(198,161,91,.5);
    background:transparent;
    color:var(--cream);
    font-size:.85rem;
    cursor:pointer;
  }
  button.ghost:hover{background:rgba(255,255,255,.06);}
  .status{font-size:.75rem;margin-top:10px;min-height:1em;color:var(--gold-bright);}
  .status.err{color:#e39a9a;}

  /* CARD */
  .card-stage{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .card{
    width:400px;max-width:100%;aspect-ratio:1.586/1;
    border-radius:16px;
    position:relative;
    padding:18px 20px;
    background:
      repeating-linear-gradient(115deg, rgba(35,74,48,.05) 0px, rgba(35,74,48,.05) 1px, transparent 1px, transparent 9px),
      radial-gradient(circle at 100% 0%, rgba(198,161,91,.18), transparent 55%),
      var(--paper);
    box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(198,161,91,.6);
    color:var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:6px;
    border:1px solid rgba(198,161,91,.65);
    border-radius:11px;
    pointer-events:none;
  }
  .card-top{display:flex;align-items:center;gap:10px;}
  .card-top .crest{width:38px;height:38px;flex-shrink:0;}
  .card-top .titles{line-height:1.15;}
  .card-top .club-name{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    font-size:1.02rem;
    letter-spacing:.03em;
    color:var(--green-deep);
    text-transform:uppercase;
  }
  .card-top .club-sub{
    font-size:.6rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .card-divider{
    height:1px;
    margin:9px 0 11px;
    background:linear-gradient(90deg, transparent, var(--gold) 15%, var(--gold) 85%, transparent);
  }
  .card-body{display:flex;gap:14px;flex:1;min-height:0;}
  .card-photo{
    width:78px;height:96px;border-radius:6px;flex-shrink:0;
    background:linear-gradient(160deg,#dfd6b8,#cfc4a0);
    background-size:cover;background-position:center;
    border:1px solid rgba(198,161,91,.7);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--green-deep);
  }
  .card-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-start;}
  .card-info .field-label{
    font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);
    margin-top:8px;
  }
  .card-info .field-label:first-child{margin-top:0;}
  .card-info .socio-name{
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.28rem;
    line-height:1.1;color:var(--green-deep);
    word-break:break-word;
  }
  .card-info .field-value{font-size:.85rem;font-weight:600;color:var(--ink);}
  .card-qr-wrap{
    position:absolute;right:16px;bottom:14px;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .card-qr-wrap canvas, .card-qr-wrap img{border-radius:4px;}
  .card-qr-wrap span{font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
  .card-id{
    position:absolute;left:20px;bottom:14px;
    font-size:.55rem;letter-spacing:.08em;color:var(--ink-soft);
  }

  .card-actions{display:flex;gap:10px;}

  /* Gallery */
  .gallery-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:44px 0 16px;
  }
  .gallery-head h2{
    font-family:'Cormorant Garamond',serif;color:var(--gold-bright);font-size:1.3rem;margin:0;font-weight:600;
  }
  .gallery-head span{font-size:.75rem;opacity:.6;}
  .gallery{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:14px;
  }
  .mini-card{
    background:var(--paper);border-radius:10px;padding:10px;
    border:1px solid rgba(198,161,91,.5);
    cursor:pointer;position:relative;color:var(--ink);
    transition:transform .12s ease;
  }
  .mini-card:hover{transform:translateY(-2px);}
  .mini-card .mini-photo{
    width:40px;height:40px;border-radius:50%;background-size:cover;background-position:center;
    background:linear-gradient(160deg,#dfd6b8,#cfc4a0);
    border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;color:var(--green-deep);font-weight:700;
    margin-bottom:8px;
  }
  .mini-card .mini-name{font-weight:700;font-size:.85rem;line-height:1.2;}
  .mini-card .mini-since{font-size:.65rem;color:var(--ink-soft);margin-top:2px;}
  .mini-del{
    position:absolute;top:6px;right:6px;
    width:20px;height:20px;border-radius:50%;
    background:rgba(139,58,58,.12);color:var(--danger);
    border:none;font-size:.7rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .mini-del:hover{background:rgba(139,58,58,.25);}
  .empty-note{font-size:.85rem;opacity:.55;grid-column:1/-1;}

  @media print{
    body *{visibility:hidden;}
    #printCard, #printCard *{visibility:visible;}
    #printCard{position:fixed;top:20mm;left:50%;transform:translateX(-50%);}
    .card{box-shadow:none;width:85.6mm;aspect-ratio:1.586/1;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="app-head">
    <svg class="crest-mini" viewBox="0 0 100 100"><use href="#crestSymbol"/></svg>
    <h1>Clube de Campo Adriana</h1>
    <p>CCA · Carteirinha de Sócio</p>
  </header>

  <div class="grid">
    <!-- FORM -->
    <div class="panel">
      <h2>Cadastrar sócio</h2>

      <label for="fNome">Nome completo</label>
      <input type="text" id="fNome" placeholder="Ex: Adriana Prado">

      <label for="fCpf">CPF</label>
      <input type="text" id="fCpf" placeholder="000.000.000-00" maxlength="14">

      <label for="fDesde">Membro desde</label>
      <input type="date" id="fDesde">

      <label>Foto</label>
      <div class="photo-row">
        <div class="photo-preview" id="photoPreview">?</div>
        <label class="file-btn" for="fFoto">Escolher foto</label>
        <input type="file" id="fFoto" accept="image/*">
      </div>

      <div class="actions">
        <button class="primary" id="btnGerar">Gerar carteirinha</button>
        <button class="ghost" id="btnLimpar">Limpar</button>
      </div>
      <div class="status" id="formStatus"></div>
    </div>

    <!-- CARD PREVIEW -->
    <div class="panel">
      <h2>Prévia da carteirinha</h2>
      <div class="card-stage">
        <div id="printCard">
          <div class="card" id="cardEl">
            <div class="card-top">
              <svg class="crest" viewBox="0 0 100 100"><use href="#crestSymbol"/></svg>
              <div class="titles">
                <div class="club-name">Clube de Campo Adriana</div>
                <div class="club-sub">CCA · Carteira de Sócio</div>
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-body">
              <div class="card-photo" id="cardPhoto">?</div>
              <div class="card-info">
                <div class="socio-name" id="cardNome">Nome do Sócio</div>
                <div class="field-label">Membro desde</div>
                <div class="field-value" id="cardDesde">—</div>
                <div class="field-label">CPF</div>
                <div class="field-value" id="cardCpf">—</div>
              </div>
            </div>
            <div class="card-qr-wrap" id="cardQr"><div id="qrHost"></div><span>verificar</span></div>
          </div>
        </div>
        <div class="card-actions">
          <button class="ghost" id="btnImprimir">Imprimir / salvar como PDF</button>
        </div>
      </div>
    </div>
  </div>

  <div class="gallery-head">
    <h2>Sócios cadastrados</h2>
    <span id="galleryCount"></span>
  </div>
  <div class="gallery" id="gallery"></div>

</div>

<!-- shared SVG crest definition -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="crestSymbol">
      <path d="M50 4 L90 18 V50 C90 72 72 88 50 96 C28 88 10 72 10 50 V18 Z" fill="#234A30" stroke="#C6A15B" stroke-width="3"/>
      <path d="M50 4 L90 18 V50 C90 72 72 88 50 96 C28 88 10 72 10 50 V18 Z" fill="none" stroke="#E4C87A" stroke-width="1"/>
      <text x="50" y="60" text-anchor="middle" font-family="Cormorant Garamond, serif" font-weight="700" font-size="32" fill="#E4C87A">CCA</text>
      <path d="M20 30 C15 45 15 60 25 72" fill="none" stroke="#C6A15B" stroke-width="2"/>
      <path d="M80 30 C85 45 85 60 75 72" fill="none" stroke="#C6A15B" stroke-width="2"/>
    </g>
  </defs>
</svg>

<script>
let currentPhotoData = null; // resized base64
let editingId = null;

const $ = (id) => document.getElementById(id);

function initials(name){
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('') || '?';
}

function maskCpf(v){
  v = v.replace(/\D/g,'').slice(0,11);
  if(v.length>9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
  if(v.length>6) return v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  if(v.length>3) return v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  return v;
}
$('fCpf').addEventListener('input', (e)=>{ e.target.value = maskCpf(e.target.value); });

function formatDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// resize + compress uploaded photo
function handlePhotoFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const size = 200;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const side = Math.min(img.width, img.height);
        const sx = (img.width-side)/2, sy = (img.height-side)/2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

$('fFoto').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    currentPhotoData = await handlePhotoFile(file);
    $('photoPreview').style.backgroundImage = `url(${currentPhotoData})`;
    $('photoPreview').textContent = '';
  }catch(err){
    setStatus('Não foi possível carregar a foto.', true);
  }
});

function setStatus(msg, isErr){
  const el = $('formStatus');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

function renderCard(data){
  $('cardNome').textContent = data.nome || 'Nome do Sócio';
  $('cardDesde').textContent = formatDate(data.desde);
  $('cardCpf').textContent = data.cpf || '—';
  const photoEl = $('cardPhoto');
  if(data.foto){
    photoEl.style.backgroundImage = `url(${data.foto})`;
    photoEl.textContent = '';
  } else {
    photoEl.style.backgroundImage = 'none';
    photoEl.textContent = initials(data.nome || '?');
  }
  // QR: encode the identification text directly so any camera can read it, no hosting needed
  const qrText =
`CLUBE DE CAMPO ADRIANA - CCA
Sócio: ${data.nome || ''}
CPF: ${data.cpf || ''}
Membro desde: ${formatDate(data.desde)}`;
  const qrDiv = $('qrHost');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {
    text: qrText,
    width: 62, height: 62,
    colorDark: '#16301F',
    colorLight: '#FBF7EC',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function clearForm(){
  $('fNome').value=''; $('fCpf').value=''; $('fDesde').value='';
  currentPhotoData = null; editingId = null;
  $('photoPreview').style.backgroundImage='none';
  $('photoPreview').textContent='?';
  $('fFoto').value='';
  setStatus('');
}

async function saveSocio(){
  const nome = $('fNome').value.trim();
  const cpf = $('fCpf').value.trim();
  const desde = $('fDesde').value;
  if(!nome){ setStatus('Informe o nome do sócio.', true); return; }
  const id = editingId || ('s' + Date.now());
  const data = { nome, cpf, desde, foto: currentPhotoData };
  renderCard(data);
  try{
    const res = await window.storage.set('socio:'+id, JSON.stringify(data), true);
    if(!res){ setStatus('Não foi possível salvar — tente novamente.', true); return; }
    setStatus('Carteirinha gerada e salva ✓');
    editingId = id;
    loadGallery();
  }catch(err){
    setStatus('Erro ao salvar. A prévia acima ainda funciona.', true);
  }
}

$('btnGerar').addEventListener('click', saveSocio);
$('btnLimpar').addEventListener('click', clearForm);
$('btnImprimir').addEventListener('click', ()=>window.print());

async function loadGallery(){
  const galleryEl = $('gallery');
  try{
    const listRes = await window.storage.list('socio:', true);
    const keys = (listRes && listRes.keys) || [];
    if(keys.length === 0){
      galleryEl.innerHTML = '<div class="empty-note">Nenhum sócio cadastrado ainda.</div>';
      $('galleryCount').textContent = '';
      return;
    }
    const items = [];
    for(const key of keys){
      try{
        const r = await window.storage.get(key, true);
        if(r && r.value) items.push({key, data: JSON.parse(r.value)});
      }catch(e){ /* skip unreadable key */ }
    }
    items.sort((a,b)=> (a.data.nome||'').localeCompare(b.data.nome||''));
    $('galleryCount').textContent = items.length + (items.length===1?' sócio':' sócios');
    galleryEl.innerHTML = '';
    items.forEach(({key,data})=>{
      const card = document.createElement('div');
      card.className = 'mini-card';
      card.innerHTML = `
        <button class="mini-del" title="Excluir">✕</button>
        <div class="mini-photo" style="${data.foto ? `background-image:url(${data.foto})` : ''}">${data.foto ? '' : initials(data.nome||'?')}</div>
        <div class="mini-name">${escapeHtml(data.nome||'—')}</div>
        <div class="mini-since">Sócio desde ${formatDate(data.desde)}</div>
      `;
      card.addEventListener('click', (e)=>{
        if(e.target.classList.contains('mini-del')) return;
        editingId = key.replace('socio:','');
        $('fNome').value = data.nome||'';
        $('fCpf').value = data.cpf||'';
        $('fDesde').value = data.desde||'';
        currentPhotoData = data.foto||null;
        $('photoPreview').style.backgroundImage = data.foto ? `url(${data.foto})` : 'none';
        $('photoPreview').textContent = data.foto ? '' : '?';
        renderCard(data);
        setStatus('Sócio carregado para edição.');
        window.scrollTo({top:0, behavior:'smooth'});
      });
      card.querySelector('.mini-del').addEventListener('click', async ()=>{
        try{
          await window.storage.delete(key, true);
          loadGallery();
        }catch(e){ setStatus('Não foi possível excluir.', true); }
      });
      galleryEl.appendChild(card);
    });
  }catch(err){
    galleryEl.innerHTML = '<div class="empty-note">Não foi possível carregar a galeria agora.</div>';
  }
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// initial render
renderCard({nome:'', cpf:'', desde:'', foto:null});
loadGallery();
</script>
</body>
</html>
